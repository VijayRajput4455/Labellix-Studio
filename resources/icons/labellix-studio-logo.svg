<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="edge" x1="120" y1="70" x2="360" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2FE9F6"/>
      <stop offset="1" stop-color="#B839FF"/>
    </linearGradient>
    <linearGradient id="studio" x1="560" y1="188" x2="740" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2FE9F6"/>
      <stop offset="1" stop-color="#59D6FF"/>
    </linearGradient>
    <filter id="glow" x="0" y="0" width="500" height="360" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#glow)">
    <path d="M130 85V285" stroke="url(#edge)" stroke-width="22" stroke-linecap="round"/>
    <path d="M130 85H325" stroke="url(#edge)" stroke-width="22" stroke-linecap="round"/>
    <path d="M325 85V245C325 267.1 307.1 285 285 285H130" stroke="url(#edge)" stroke-width="22" stroke-linecap="round"/>

    <circle cx="130" cy="85" r="16" fill="url(#edge)"/>
    <circle cx="325" cy="85" r="16" fill="url(#edge)"/>
    <circle cx="130" cy="285" r="16" fill="url(#edge)"/>
  </g>

  <text x="420" y="170" font-family="Segoe UI, Arial, sans-serif" font-size="102" font-weight="700" fill="#F8FBFF">Labellix</text>
  <text x="420" y="265" font-family="Segoe UI, Arial, sans-serif" font-size="88" font-weight="600" fill="url(#studio)">Studio</text>
  <text x="420" y="325" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="400" fill="#A8AFBF">AI Annotation Platform</text>
</svg>
